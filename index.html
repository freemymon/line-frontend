<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS-MON | Acknowledge</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 80%;
            width: 350px;
        }
        .icon-check {
            width: 80px;
            height: 80px;
            background: #00b900;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            margin: 0 auto 1.5rem;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #111;
        }
        p {
            color: #666;
            line-height: 1.5;
            margin-bottom: 2rem;
        }
        .btn-close {
            background-color: #00b900;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }
        .btn-close:active {
            background-color: #009900;
            transform: scale(0.98);
        }
        #user-name {
            font-weight: bold;
            color: #00b900;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon-check">✓</div>
        <h1>ได้รับข้อมูลแล้ว</h1>
        <p>ขอบคุณ <span id="user-name">คุณลูกค้า</span><br>ระบบ CS-MON บันทึกข้อมูลการรับทราบของคุณเรียบร้อยแล้ว</p>
        <!-- ปุ่มจะแสดงเฉพาะเมื่ออยู่ใน LINE app -->
        <button class="btn-close" id="btn-close" style="display:none;" onclick="closeLiff()">ปิดหน้านี้</button>
    </div>

    <script>
        // เริ่มต้นใช้งาน LIFF
        async function main() {
            try {
                await liff.init({ liffId: "2010160720-7Lz0zYRN" });

                // แสดงปุ่มปิดเฉพาะตอนอยู่ใน LINE app
                if (liff.isInClient()) {
                    document.getElementById('btn-close').style.display = 'block';
                }

                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    document.getElementById('user-name').innerText = profile.displayName;
                } else {
                    liff.login();
                }
            } catch (err) {
                console.error("LIFF Init Error: ", err);
            }
        }

        // ฟังก์ชันปิดหน้าต่าง LIFF (ทำงานได้เฉพาะใน LINE app)
        function closeLiff() {
            if (liff.isInClient()) {
                liff.closeWindow();
            }
        }

        main();
    </script>
</body>
</html>
