<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS-MON | Acknowledge</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 80%;
            width: 350px;
        }
        .icon-check {
            width: 80px;
            height: 80px;
            background: #00b900;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            margin: 0 auto 1.5rem;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #111;
        }
        p {
            color: #666;
            line-height: 1.5;
            margin-bottom: 1.5rem;
        }
        #user-name {
            font-weight: bold;
            color: #00b900;
        }
        .countdown {
            font-size: 0.85rem;
            color: #aaa;
            display: none;
        }
        .countdown span {
            font-weight: bold;
            color: #00b900;
        }
        .btn-close {
            background-color: #00b900;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
            display: none;
        }
        .btn-close:active {
            background-color: #009900;
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-check">✓</div>
        <h1>ได้รับข้อมูลแล้ว</h1>
        <p>ขอบคุณ <span id="user-name">คุณลูกค้า</span><br>ระบบ CS-MON บันทึกข้อมูลการรับทราบของคุณเรียบร้อยแล้ว</p>
        <p class="countdown" id="countdown">
            หน้านี้จะปิดใน <span id="timer">3</span> วินาที...
        </p>
        <button class="btn-close" id="btn-close" onclick="safeClose()">ปิดหน้านี้</button>
    </div>

    <script>
        async function main() {
            try {
                await liff.init({ liffId: "2010160720-7Lz0zYRN" });

                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }

                // ดึงชื่อ user
                try {
                    const profile = await liff.getProfile();
                    document.getElementById('user-name').innerText = profile.displayName;
                } catch (e) {
                    // ไม่ได้ชื่อก็ไม่เป็นไร
                }

                if (liff.isInClient()) {
                    // อยู่ใน LINE → นับถอยหลังแล้วปิดอัตโนมัติ
                    startCountdown(3);
                } else {
                    // อยู่ใน browser → แสดงปุ่มเฉยๆ ไม่ปิดเอง
                    document.getElementById('btn-close').style.display = 'block';
                }

            } catch (err) {
                // LIFF init ล้มเหลว (เช่น เปิดใน browser ตรงๆ)
                // ไม่ทำอะไร ไม่ close ไม่ error
                console.warn("LIFF not available:", err);
            }
        }

        function startCountdown(seconds) {
            const countdownEl = document.getElementById('countdown');
            const timerEl = document.getElementById('timer');
            countdownEl.style.display = 'block';
            timerEl.innerText = seconds;

            const interval = setInterval(() => {
                seconds--;
                timerEl.innerText = seconds;
                if (seconds <= 0) {
                    clearInterval(interval);
                    safeClose();
                }
            }, 1000);
        }

        function safeClose() {
            // ปิดเฉพาะเมื่ออยู่ใน LINE จริงๆ เท่านั้น
            try {
                if (liff.isInClient()) {
                    liff.closeWindow();
                }
                // ถ้าไม่ใช่ LINE → ไม่ทำอะไรเลย (ไม่ window.close())
            } catch (e) {
                // กัน error ทุกกรณี ไม่ให้ popup ขึ้น
                console.warn("closeWindow failed:", e);
            }
        }

        main();
    </script>
</body>
</html>
